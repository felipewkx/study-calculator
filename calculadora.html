<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora Estável</title>

<style>
body {
    background: #f3f3f3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

.calc {
    background: #e6e6e6;
    width: 320px;
    padding: 10px;
    border: 1px solid #bbb;
    box-sizing: border-box;
}

#display {
    width: 100%;
    height: 80px;
    text-align: right;
    font-size: 2.5rem;
    padding: 10px;
    border: none;
    background: transparent;
    box-sizing: border-box; /* 🔥 ESSENCIAL */
    overflow: hidden;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
}

button {
    height: 50px;
    font-size: 1.2rem;
}
</style>
</head>

<body>

<div class="calc">
<input type="text" id="display" value="0" readonly>

<div class="buttons">
<button onclick="limpar()">C</button>
<button onclick="digitar('/')">/</button>
<button onclick="digitar('*')">*</button>
<button onclick="apagar()">Del</button>

<button onclick="digitar('7')">7</button>
<button onclick="digitar('8')">8</button>
<button onclick="digitar('9')">9</button>
<button onclick="digitar('-')">-</button>

<button onclick="digitar('4')">4</button>
<button onclick="digitar('5')">5</button>
<button onclick="digitar('6')">6</button>
<button onclick="digitar('+')">+</button>

<button onclick="digitar('1')">1</button>
<button onclick="digitar('2')">2</button>
<button onclick="digitar('3')">3</button>
<button onclick="calcular()" style="grid-row: span 2;">=</button>

<button onclick="digitar('0')" style="grid-column: span 2;">0</button>
<button onclick="digitar('.')">.</button>
</div>
</div>

<script>
let expressao = "";

function ehOperador(c) {
    return ['+', '-', '*', '/'].includes(c);
}

function digitar(valor) {
    const tela = document.getElementById("display");

    // Substituir 0 inicial
    if (tela.value === "0" && !ehOperador(valor)) {
        expressao = valor;
        tela.value = expressao;
        return;
    }

    // Impedir operadores duplicados
    let ultimo = expressao.slice(-1);
    if (ehOperador(ultimo) && ehOperador(valor)) {
        expressao = expressao.slice(0, -1) + valor;
    } else {
        expressao += valor;
    }

    tela.value = expressao;
}

function limpar() {
    expressao = "";
    document.getElementById("display").value = "0";
}

function apagar() {
    expressao = expressao.slice(0, -1);

    if (expressao === "") {
        document.getElementById("display").value = "0";
    } else {
        document.getElementById("display").value = expressao;
    }
}

function calcular() {
    try {
        let resultado = eval(expressao);

        // Divisão por zero
        if (!isFinite(resultado)) {
            alert("Erro: Divisão por zero!");
            limpar();
            return;
        }

        // Corrigir precisão decimal
        resultado = parseFloat(resultado.toFixed(10));

        document.getElementById("display").value = resultado;
        expressao = resultado.toString(); // sincroniza memória

    } catch {
        document.getElementById("display").value = "Erro";
        expressao = "";
    }
}
</script>

</body>
</html>
